<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./../css/styles.css">
    <link rel="stylesheet" href="./../css/contacto.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Quintessential&display=swap"
        rel="stylesheet">
    <title>Contacto</title>
</head>

<body>
    <header>
        <div class="main-div">
            <div class="menu_log">
                <a href="./index.html"><img src="./../img/develop-svgrepo-com.svg" alt="" class="logo"></a>
            </div>
            <input type="checkbox" id="check-menu">
            <label for="check-menu"><img src="./../img/menu-2.svg" alt="" class="logo_hamburger"></label>
            <nav class="head_menu">
                <ul class="list_menu">
                    <li class="item_menu"><a href="./index.html" class="link_menu">INICIO</a></li>
                    <li class="item_menu"><a href="./galeria.html" class="link_menu">GALERIA</a></li>
                    <li class="item_menu"><a href="#" class="link_menu">CONTACTO</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="welcome_head">
            <h1 class="title">Contacto</h1>
            <p class="pharagrap_head">
                Hola, si quieres realizar algun trabajo conmigo, o necesitas ayuda sobre un tema especifico te
                recomiendo llenar el fomulario
            </p>
        </div>


        <form action="" class="form">
            <fieldset>
                <legend>Informacion personal</legend>
                <label for="name">Nombre:
                    <input type="text" placeholder="Sebastian Zarate" id="name">
                </label>

                <label for="phone-number">Telefono:
                    <input type="number" placeholder="+57 3152....." id="phone-number">
                </label>

                <label for="email">Correo:
                    <input type="text" placeholder="Ejemplo@gmail.com" id="email">
                </label>
            </fieldset>

            <fieldset>
                <legend>Solicitud</legend>
                <label for="problem">
                    <textarea name="" id="" class="text_area" placeholder="escribe tu solicitud aqui"></textarea>
                </label>

                <input type="checkbox" id="chek" class="chek">
                <label for="chek" class="chek">El tiempo de respuesta es de 5 a 6 dias, estas de acuerdo?</label>
            </fieldset>

            <button class="but">Enviar</button>

        </form>
    </main>

    <footer>
        <p>
            Desarollado por: Sebastian Zarate <br>
            Derechos reservados
        </p>
    </footer>

</body>

</html>
